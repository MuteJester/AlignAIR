name: Release

# Tag a release (e.g. `git tag v3.0.0 && git push --tags`) to build + publish artifacts.
on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  packages: write

jobs:
  pypi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip build twine
      - run: python -m build                       # sdist + wheel into dist/
      - run: twine check dist/*
      - name: Release smoke on the built wheel (doctor -> demo -> validate-airr -> compare)
        run: |
          python -m venv /tmp/relenv
          /tmp/relenv/bin/pip install --upgrade pip
          /tmp/relenv/bin/pip install torch --index-url https://download.pytorch.org/whl/cpu
          /tmp/relenv/bin/pip install "$(ls dist/*.whl)[cli]"
          ALIGNAIR=/tmp/relenv/bin/alignair sh scripts/release_smoke.sh "$RUNNER_TEMP/rel_smoke"
      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}   # set this repo secret
        run: twine upload dist/*

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image locally
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: alignair:rel
      - name: Release smoke inside the container before pushing
        run: |
          mkdir -p "$RUNNER_TEMP/rel_docker_smoke"
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            --entrypoint sh \
            -e HOME=/out \
            -v "$PWD/scripts:/scripts:ro" \
            -v "$RUNNER_TEMP/rel_docker_smoke:/out" \
            alignair:rel /scripts/release_smoke.sh /out
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push (tag + latest) — reuses the smoke-tested build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest
