name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:      # allow manual runs on any branch (e.g. to check the cross-platform matrix)

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (CPU torch + package + test deps)
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install ".[cli]" pytest
      - name: Smoke — CLI is wired
        run: |
          alignair --version
          alignair doctor
      - name: Tests
        run: pytest -q

  # The full suite runs on Linux (above). This job proves the package *runs* on macOS + Windows too,
  # exercising the platform-sensitive code paths — cross-process file locking (POSIX flock vs the
  # Windows O_EXCL fallback), atomic os.replace, the .alignair container read/write, CSV newline
  # handling, and path handling. The compiled-wheel-per-OS build is validated separately (wheels.yml).
  crossplatform:
    name: cross-platform (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    defaults:
      run:
        shell: bash            # identical commands on all three OSes (git-bash on Windows runners)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install (CPU torch + package + pytest)
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install ".[cli]" pytest
      - name: Smoke — CLI is wired
        run: |
          alignair --version
          alignair doctor
      - name: Platform-sensitive tests (I/O, container, registry locking, atomic replace, paths)
        run: pytest -q tests/alignair/io tests/alignair/model_file tests/alignair/registry

  wheel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build --wheel
      - name: Install the built wheel into a clean venv (CPU torch)
        run: |
          python -m venv /tmp/wheelenv
          /tmp/wheelenv/bin/pip install --upgrade pip
          /tmp/wheelenv/bin/pip install torch --index-url https://download.pytorch.org/whl/cpu
          /tmp/wheelenv/bin/pip install "$(ls dist/*.whl)[cli]"
      - name: Release smoke (doctor -> demo -> validate-airr -> compare)
        run: ALIGNAIR=/tmp/wheelenv/bin/alignair sh scripts/release_smoke.sh "$RUNNER_TEMP/wheel_smoke"

  conda:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -el {0}        # login shell so `conda activate` works
    steps:
      - uses: actions/checkout@v4
      - uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest
          python-version: "3.11"
          channels: conda-forge,bioconda
          channel-priority: strict
      - name: Validate the recipe renders (local-source mode)
        env:
          ALIGNAIR_LOCAL_BUILD: "1"
        run: |
          conda install -y conda-build
          # `conda render` was removed from modern conda; `conda-build --output` renders the recipe
          # (evaluates the Jinja + resolves the output path) without building it.
          conda-build conda/ --output
      - name: Conda-env runtime smoke (conda pytorch + pip install + tiny demo)
        run: |
          conda install -y "pytorch>=2.2" "numpy>=1.24" "pandas>=1.5" -c conda-forge
          pip install ".[cli]"          # GenAIRR + AlignAIR are PyPI-only for now
          alignair doctor
          alignair reference list
          alignair demo --steps 1 --device cpu -o "$RUNNER_TEMP/conda_demo"
          alignair validate-airr "$RUNNER_TEMP/conda_demo/demo.tsv"

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t alignair:ci .
      - name: Smoke — image runs the CLI
        run: |
          docker run --rm alignair:ci --version
          docker run --rm alignair:ci doctor
      - name: Release smoke inside the container (same script as the wheel)
        run: |
          mkdir -p "$RUNNER_TEMP/docker_smoke"
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            --entrypoint sh \
            -e HOME=/out \
            -v "$PWD/scripts:/scripts:ro" \
            -v "$RUNNER_TEMP/docker_smoke:/out" \
            alignair:ci /scripts/release_smoke.sh /out
