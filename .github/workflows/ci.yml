name: CI

on:
  push:
    branches: [main, pytorch-migration]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (CPU torch + package + test deps)
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install ".[cli]" pytest
      - name: Smoke — CLI is wired
        run: |
          alignair --version
          alignair doctor
      - name: Tests
        run: pytest -q

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install docs deps
        run: |
          python -m pip install --upgrade pip
          pip install ".[docs]"
      - name: Build docs (strict — fails on stale/unlisted pages)
        run: mkdocs build --strict

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t alignair:ci .
      - name: Smoke — image runs the CLI
        run: |
          docker run --rm alignair:ci --version
          docker run --rm alignair:ci doctor
