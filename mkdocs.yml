site_name: AlignAIR v2.0 Documentation
nav:
  - Home: index.md
  - Getting Started: getting_started.md
  - Python API: python_api.md
  - AIRR Fields: airr_fields.md
  - Known Failure Modes: known_failure_modes.md
  - Benchmarks: benchmarks.md
  - Performance: performance.md
  - Troubleshooting: troubleshooting.md
  - DNAlignAIR Design: dnalignair.md
  - Architecture:
      - User-Facing API Review: architecture/user_facing_api_review.md
      - Adoption Roadmap: architecture/adoption_roadmap.md
      - Coordinate Redesign: architecture/dnalignair_coordinate_redesign.md

# Quarantine non-public pages from the built site (kept in the repo, not published):
#   - superpowers/  internal design specs & implementation plans
#   - alignair_steps_brakdown.md  stale TF/Keras (v2 legacy) pipeline walkthrough
#   - tutorials/  legacy TensorFlow notebook (to be replaced by fresh v3 notebooks)
exclude_docs: |
  superpowers/
  alignair_steps_brakdown.md
  tutorials/

# Fail `mkdocs build --strict` if a new page is ever added outside the nav without
# being excluded above — keeps the published doc set deliberate.
validation:
  omitted_files: warn
  absolute_links: warn
  unrecognized_links: warn

theme:
  name: readthedocs
  locale: en
  color_mode: dark
plugins:
    - mkdocs-jupyter
