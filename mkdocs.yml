site_name: AlignAIR
site_description: A neural aligner for immunoglobulin (IG) and T-cell receptor (TCR) repertoires — more accurate than IgBLAST, with standard AIRR output.
site_url: https://MuteJester.github.io/AlignAIR/
repo_url: https://github.com/MuteJester/AlignAIR
repo_name: MuteJester/AlignAIR
edit_uri: edit/main/docs/
copyright: Copyright &copy; AlignAIR — GPL-3.0-or-later

nav:
  - Home: index.md
  - Getting started: getting_started.md
  - Guides:
      - Pretrained models: models.md
      - Command-line reference: cli.md
      - Python API: python_api.md
  - Output & behavior:
      - AIRR output fields: airr_fields.md
      - Model contract: model_contract.md
      - Known failure modes: known_failure_modes.md
  - Performance:
      - Benchmarks — vs IgBLAST: benchmarks.md
      - Speed & throughput: performance.md
  - Design & internals: dnalignair.md
  - Troubleshooting: troubleshooting.md
  - Maintainer:
      - Publishing models: publishing_models.md

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - toc.follow
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true

# Keep any locally-generated internal design specs (gitignored) out of the built site.
exclude_docs: |
  superpowers/

# Keep the published doc set deliberate: `mkdocs build --strict` fails if a page is added outside the
# nav without being excluded above.
validation:
  omitted_files: warn
  absolute_links: warn
  unrecognized_links: warn
